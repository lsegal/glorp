name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.0
        required: true
        type: string
permissions:
  actions: write
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: web
      - run: go test ./...
      - run: go vet ./...
      - name: Select release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.version }}"
          tag="v${tag#v}"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "invalid release version: $tag" >&2; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Promote changelog and create tag
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          date="$(date -u +%Y-%m-%d)"
          if ! grep -qF "## ${TAG} - " CHANGELOG.md; then
            awk -v tag="$TAG" -v date="$date" '
              BEGIN { in_unreleased=0; count=0; promoted=0 }
              /^## Unreleased$/ { print; print ""; in_unreleased=1; next }
              in_unreleased && /^## / {
                print "## " tag " - " date; print ""
                for (i = 1; i <= count; i++) print entries[i]
                print ""; in_unreleased=0; promoted=1
              }
              in_unreleased && /^- / { entries[++count]=$0; next }
              in_unreleased { next }
              { print }
              END {
                if (in_unreleased) {
                  print "## " tag " - " date; print ""
                  for (i = 1; i <= count; i++) print entries[i]
                  promoted=1
                }
                if (!promoted) exit 1
              }
            ' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add CHANGELOG.md
            git diff --cached --quiet || git commit -m "Prepare ${TAG} release"
            git push origin HEAD:main
          fi
          if ! git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
      - name: Finalize release
        run: gh workflow run finalize-release.yml --repo "$GITHUB_REPOSITORY" --ref "${{ steps.release.outputs.tag }}" -f tag="${{ steps.release.outputs.tag }}"
        env:
          GH_TOKEN: ${{ github.token }}
