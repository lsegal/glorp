{{- $readme := readFile "README.md" -}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Git Loop fOr Robot Patchers watches GitHub issues and dispatches coding agents to fix them.">
    <meta name="theme-color" content="#24245c">
    <title>{{ site.Title }}</title>
    <link rel="icon" type="image/svg" href="{{ "assets/glorp-logo.svg" | relURL }}">
    <link rel="stylesheet" href="{{ "style.css" | relURL }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="glorp home">
        <img src="{{ "assets/glorp-logo.svg" | relURL }}" alt="">
        <span>glorp</span>
      </a>
      <a class="repo-link" href="https://github.com/lsegal/glorp">View on GitHub</a>
    </header>
    <main class="readme">
      {{- $readme | markdownify -}}
    </main>
    <footer>
      Generated from <a href="https://github.com/lsegal/glorp/blob/main/README.md">README.md</a> with Hugo.
    </footer>
  </body>
</html>
